<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nginx Docker</title>
    <style>
        :root {
            color-scheme: light dark;
            --bg: radial-gradient(circle at 20% 20%, #4f46e5 0, transparent 30%),
                   radial-gradient(circle at 80% 0%, #22c55e 0, transparent 30%),
                   radial-gradient(circle at 20% 80%, #f97316 0, transparent 25%),
                   #0f172a;
            --card: rgba(15, 23, 42, 0.72);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --border: rgba(226, 232, 240, 0.08);
            --accent: #38bdf8;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: var(--bg);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: var(--text);
            padding: 24px;
        }
        .card {
            width: min(960px, 100%);
            border: 1px solid var(--border);
            border-radius: 20px;
            background: var(--card);
            box-shadow: var(--shadow);
            overflow: hidden;
            backdrop-filter: blur(12px);
            position: relative;
            isolation: isolate;
        }
        .header {
            padding: 32px 32px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            letter-spacing: 0.4px;
            font-size: 18px;
        }
        .logo-badge {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, #38bdf8, #4f46e5);
            display: grid;
            place-items: center;
            color: #0b1221;
            font-weight: 800;
            box-shadow: 0 10px 30px rgba(56, 189, 248, 0.35);
        }
        .status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 999px;
            background: rgba(56, 189, 248, 0.12);
            color: #bae6fd;
            font-size: 13px;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #34d399;
            box-shadow: 0 0 0 6px rgba(52, 211, 153, 0.18);
        }
        .body {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 24px;
            padding: 24px 32px 32px;
        }
        .hero {
            display: grid;
            gap: 12px;
        }
        .hero h1 {
            margin: 0;
            font-size: clamp(28px, 4vw, 40px);
            letter-spacing: -0.5px;
        }
        .hero p { margin: 0; color: var(--muted); line-height: 1.6; }
        .grid {
            display: grid;
            gap: 12px;
        }
        .tile {
            padding: 18px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.02);
        }
        .tile h3 { margin: 0 0 6px; font-size: 16px; }
        .tile p { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.5; }

        code { font-family: 'SFMono-Regular', Consolas, Menlo, monospace; color: #a5f3fc; }
        footer {
            border-top: 1px solid var(--border);
            padding: 14px 24px;
            color: var(--muted);
            font-size: 13px;
            text-align: center;
            background: rgba(0, 0, 0, 0.12);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="logo">
                <div class="logo-badge">NG</div>
                <div>
                    <div>Nginx Docker</div>
                    <div style="color: var(--muted); font-size: 13px;">默认站点已就绪</div>
                </div>
            </div>
            <div class="status"><span class="status-dot"></span> 正在运行</div>
        </div>
        <div class="body">
            <div class="hero">
                <h1>欢迎使用 Nginx Docker</h1>
                <p>这是预置的示例首页。你可以替换此文件或通过挂载自定义目录，快速构建属于自己的站点。</p>
            </div>

            
        </div>
        <footer>Powered by Nginx · Docker</footer>
    </div>
</body>
</html>
