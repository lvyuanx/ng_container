user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 安全：隐藏版本信息，扩展类型哈希容量
    server_tokens off;
    types_hash_max_size 2048;

    # 传输与连接优化
    sendfile on;            # sendfile 发送文件，减少拷贝
    tcp_nopush on;          # 聚合包减少头开销
    tcp_nodelay on;         # 降低小包延迟
    keepalive_timeout 15;   # 空闲连接保持时间（秒）
    keepalive_requests 100; # 单连接最大请求数

    # 上传体积限制
    client_max_body_size 20m;

    # 压缩：常见文本/JSON/JS/CSS/SVG
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript application/xml text/xml application/xml+rss text/javascript image/svg+xml;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    include /etc/nginx/conf.d/*.conf;
}
