version: "3.9"
services:
  nginx:
    image: nginx:latest
    container_name: nginx-server
    restart: always

    env_file:
      - .env

    ports:
      - "80:80"
      - "443:443"

      # 额外端口映射，格式与 compose ports 相同
      # 单个端口示例：EXTRA_PORTS=8701:27001
      # 连续端口区间：EXTRA_PORTS=8000-8099:27000-27099  # 宿主区间对应容器区间
      # 多个不连续端口：EXTRA_PORTS=8701:27001,8801:28001,9000-9002:29000-29002
      - "${EXTRA_PORTS}"

    volumes:
      # 主配置
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

      # 虚拟主机配置
      - ./nginx/conf.d:/etc/nginx/conf.d:ro

      # 网站目录
      - ./html:/usr/share/nginx/html:ro

      # 网站数据目录
      - /data:/data:ro

      # 日志
      - ./logs:/var/log/nginx

      # SSL证书（可选）
      - ./certs:/etc/nginx/certs:ro

    networks:
      - nginx-net

networks:
  nginx-net:
    driver: bridge
