version: "3.9"

services:
  nginx:
    image: nginx:latest
    container_name: nginx-server
    restart: always

    ports:
      - "80:80"
      - "443:443"
      - "8000-9999:27000-28999"


    volumes:
      # 主配置
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

      # 虚拟主机配置
      - ./nginx/conf.d:/etc/nginx/conf.d:ro

      # 网站目录
      - ./html:/usr/share/nginx/html:ro

      # 网站数据目录
      - /data:/data:ro

      # 日志
      - ./logs:/var/log/nginx

      # SSL证书（可选）
      - ./certs:/etc/nginx/certs:ro

    networks:
      - nginx-net

networks:
  nginx-net:
    driver: bridge